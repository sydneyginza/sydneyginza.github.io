name = "github-proxy"
main = "index.js"
compatibility_date = "2024-01-01"

[triggers]
crons = ["0 9 * * *", "0 10 * * *", "0 21 * * *"]  # 9:00 UTC = 7pm AEST (girls sync), 10:00 UTC = 8pm AEST (roster sync), 21:00 UTC = 8am AEDT (sitemap)

# Secrets (set via dashboard or `wrangler secret put`):
#   GITHUB_TOKEN        - GitHub personal access token
